name: ChatNow CI/CD Pipeline 

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  EKS_CLUSTER: prod-eks-cluster
  K8S_NAMESPACE: chatnow
  ECR_BACKEND: backend
  BACKEND_TAG: v2
  ECR_FRONTEND: frontend
  FRONTEND_TAG: v1

jobs:
  # ── Backend & Frontend Scans ──
  security-scans:
    name: OWASP Dependency Scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci
      # College Project: Scan chalega par fail nahi karega (continue-on-error: true)
      - name: OWASP Check
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: chatnow
          path: .
          format: HTML

  # ── Docker Build, Trivy Scan & ECR Push ──
  build-and-push:
    name: Build Images & Push to ECR
    runs-on: ubuntu-latest
    needs: security-scans
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build & Tag Backend
        run: |
          docker build -t ${{ env.ECR_BACKEND }}:${{ env.BACKEND_TAG }} ./backend
          docker tag ${{ env.ECR_BACKEND }}:${{ env.BACKEND_TAG }} ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:${{ env.BACKEND_TAG }}
      
      - name: Build & Tag Frontend
        run: |
          docker build -t ${{ env.ECR_FRONTEND }}:${{ env.FRONTEND_TAG }} ./frontend
          docker tag ${{ env.ECR_FRONTEND }}:${{ env.FRONTEND_TAG }} ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:${{ env.FRONTEND_TAG }}

      # College Project: Trivy scan fail nahi karega
      - name: Trivy Container Scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_BACKEND }}:${{ env.BACKEND_TAG }}
          format: table
          severity: CRITICAL,HIGH

      - name: Push Images
        run: |
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:${{ env.BACKEND_TAG }}
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:${{ env.FRONTEND_TAG }}

  # ── Simple EKS Deploy ──
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}
      - name: Apply K8s Manifests
        run: kubectl apply -f k8s/ -n ${{ env.K8S_NAMESPACE }}
      - name: Deploy Images
        run: |
          kubectl set image deployment/backend backend=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:${{ env.BACKEND_TAG }} -n ${{ env.K8S_NAMESPACE }}
          kubectl set image deployment/frontend frontend=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:${{ env.FRONTEND_TAG }} -n ${{ env.K8S_NAMESPACE }}
